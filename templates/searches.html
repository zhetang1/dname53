<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search History · Domain Name Finder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'system';
      var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('dark');
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.9s linear infinite; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fade-in 0.25s ease both; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 dark:from-slate-950 dark:via-slate-900 dark:to-slate-900 min-h-screen transition-colors duration-200">

  <!-- Theme toggle -->
  <button id="theme-toggle" onclick="cycleTheme()"
    class="fixed top-4 right-4 p-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 shadow-sm transition-colors"
    title="Toggle theme">
  </button>

  <div class="max-w-5xl mx-auto py-10 px-4">

    <div class="mb-8 flex items-center justify-between">
      <div>
        <a href="/" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">← Back</a>
        <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight mt-1">Search History</h1>
        <p id="meta" class="text-sm text-slate-500 dark:text-slate-400 mt-1">Loading…</p>
      </div>
    </div>

    <div id="loading" class="text-center py-16">
      <svg class="spin w-8 h-8 text-blue-600 mx-auto mb-3" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-80" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      <p class="text-slate-500 dark:text-slate-400 text-sm">Loading search history…</p>
    </div>

    <div id="error" class="hidden bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-4 text-red-700 dark:text-red-400 text-sm fade-in"></div>

    <div id="empty" class="hidden text-center py-16 text-slate-500 dark:text-slate-400 text-sm fade-in">No searches logged yet.</div>

    <div id="list" class="hidden bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm overflow-hidden fade-in">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
          <tr class="text-left text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">
            <th class="px-4 py-3 w-8"></th>
            <th class="px-4 py-3">When</th>
            <th class="px-4 py-3">Description</th>
            <th class="px-4 py-3">Results</th>
            <th class="px-4 py-3">Location</th>
            <th class="px-4 py-3">IP</th>
            <th class="px-4 py-3">User Agent</th>
          </tr>
        </thead>
        <tbody id="rows" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>
      </table>
    </div>

  </div>

  <script>
    // ── Theme ──────────────────────────────────────────────────────────
    const THEMES = ['system', 'light', 'dark'];
    const ICONS = {
      system: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>`,
      light:  `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`,
      dark:   `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/></svg>`,
    };

    function applyTheme(t) {
      const dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.toggle('dark', dark);
      document.getElementById('theme-toggle').innerHTML = ICONS[t];
      document.getElementById('theme-toggle').title = `Theme: ${t}`;
    }

    function cycleTheme() {
      const current = localStorage.getItem('theme') || 'system';
      const next = THEMES[(THEMES.indexOf(current) + 1) % THEMES.length];
      localStorage.setItem('theme', next);
      applyTheme(next);
    }

    applyTheme(localStorage.getItem('theme') || 'system');

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if ((localStorage.getItem('theme') || 'system') === 'system') applyTheme('system');
    });

    // ── App ───────────────────────────────────────────────────────────
    function esc(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(str ?? ''));
      return d.innerHTML;
    }

    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
    }

    function fmtLocation(s) {
      const parts = [s.city, s.region, s.country].filter(Boolean);
      return parts.length ? parts.join(', ') : '—';
    }

    function shortUA(ua) {
      if (!ua) return '';
      return ua.length > 60 ? ua.slice(0, 60) + '…' : ua;
    }

    function fmtPrice(n) {
      return n == null ? '—' : `$${Number(n).toFixed(2)}`;
    }

    function resultsSummary(s) {
      if (s.total_count == null) return '<span class="text-slate-400 dark:text-slate-500">—</span>';
      const avail = s.available_count ?? 0;
      const total = s.total_count;
      return `<span class="font-semibold text-green-700 dark:text-green-400">${avail}</span><span class="text-slate-400 dark:text-slate-500"> / ${total}</span>`;
    }

    function renderResultsPanel(s) {
      if (!s.results || !s.results.length) {
        return '<div class="text-slate-400 dark:text-slate-500 text-sm">No results stored.</div>';
      }
      const available = s.results.filter(r => r.available);
      const unavailable = s.results.filter(r => !r.available);

      const availHtml = available.length ? `
        <div class="mb-4">
          <div class="text-[11px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Available (${available.length})</div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
            ${available.map(r => `
              <div class="flex items-center justify-between gap-3 bg-green-50 dark:bg-green-900/20 border border-green-100 dark:border-green-900/50 rounded-lg px-3 py-2">
                <span class="font-mono text-sm text-slate-900 dark:text-slate-100 truncate">${esc(r.domain)}</span>
                <span class="text-xs text-slate-600 dark:text-slate-400 whitespace-nowrap">${r.price ? `${fmtPrice(r.price.registration)} reg · ${fmtPrice(r.price.renewal)}/yr` : 'price n/a'}</span>
              </div>
            `).join('')}
          </div>
        </div>` : '';

      const unavailHtml = unavailable.length ? `
        <div>
          <div class="text-[11px] font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Unavailable (${unavailable.length})</div>
          <div class="flex flex-wrap gap-1.5">
            ${unavailable.map(r => `<span class="font-mono text-xs text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded px-2 py-0.5" title="${esc(r.status || '')}">${esc(r.domain)}</span>`).join('')}
          </div>
        </div>` : '';

      return availHtml + unavailHtml;
    }

    function toggleRow(id) {
      const panel = document.getElementById(`panel-${id}`);
      const caret = document.getElementById(`caret-${id}`);
      if (!panel) return;
      const open = !panel.classList.contains('hidden');
      panel.classList.toggle('hidden', open);
      if (caret) caret.style.transform = open ? '' : 'rotate(90deg)';
    }

    async function load() {
      try {
        const res = await fetch('/api/searches');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('meta').textContent = `${data.count.toLocaleString()} ${data.count === 1 ? 'search' : 'searches'} logged`;

        if (!data.searches.length) {
          document.getElementById('empty').classList.remove('hidden');
          return;
        }

        const rows = document.getElementById('rows');
        rows.innerHTML = data.searches.map(s => {
          const hasResults = s.results && s.results.length;
          return `
          <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/40 ${hasResults ? 'cursor-pointer' : ''}" ${hasResults ? `onclick="toggleRow('${esc(s.id)}')"` : ''}>
            <td class="px-4 py-3 text-slate-400 dark:text-slate-500">
              ${hasResults ? `<svg id="caret-${esc(s.id)}" class="w-3 h-3 transition-transform" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clip-rule="evenodd"/></svg>` : ''}
            </td>
            <td class="px-4 py-3 text-slate-600 dark:text-slate-400 whitespace-nowrap">${esc(fmtTime(s.created_at))}</td>
            <td class="px-4 py-3 text-slate-900 dark:text-slate-100 max-w-md"><div class="line-clamp-2">${esc(s.description)}</div></td>
            <td class="px-4 py-3 text-sm whitespace-nowrap">${resultsSummary(s)}</td>
            <td class="px-4 py-3 text-slate-600 dark:text-slate-400 whitespace-nowrap">${esc(fmtLocation(s))}</td>
            <td class="px-4 py-3 text-slate-500 dark:text-slate-400 font-mono text-xs whitespace-nowrap">${esc(s.ip)}</td>
            <td class="px-4 py-3 text-slate-400 dark:text-slate-500 text-xs" title="${esc(s.user_agent)}">${esc(shortUA(s.user_agent))}</td>
          </tr>
          ${hasResults ? `
          <tr id="panel-${esc(s.id)}" class="hidden bg-slate-50/60 dark:bg-slate-900/30">
            <td></td>
            <td colspan="6" class="px-4 py-4">${renderResultsPanel(s)}</td>
          </tr>` : ''}
        `;}).join('');
        document.getElementById('list').classList.remove('hidden');
      } catch (err) {
        document.getElementById('loading').classList.add('hidden');
        const e = document.getElementById('error');
        e.textContent = 'Error: ' + err.message;
        e.classList.remove('hidden');
      }
    }

    load();
  </script>
</body>
</html>
