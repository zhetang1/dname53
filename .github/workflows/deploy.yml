name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy to AWS Elastic Beanstalk
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload deployment package
        run: |
          zip -r deploy.zip . -x "*.git*" -x ".github/*" -x "__pycache__/*" -x "*.pyc"
          BUCKET=$(aws elasticbeanstalk create-storage-location --query S3Bucket --output text)
          aws s3 cp deploy.zip "s3://${BUCKET}/${{ secrets.EB_APP_NAME }}/${{ github.sha }}.zip"
          echo "S3_BUCKET=${BUCKET}" >> $GITHUB_ENV

      - name: Create and process application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ secrets.EB_APP_NAME }}" \
            --version-label "${{ github.sha }}" \
            --source-bundle "S3Bucket=${S3_BUCKET},S3Key=${{ secrets.EB_APP_NAME }}/${{ github.sha }}.zip" \
            --process \
            --region us-east-1 2>/dev/null || true

          echo "Waiting for version to be processed..."
          for i in $(seq 1 30); do
            STATUS=$(aws elasticbeanstalk describe-application-versions \
              --application-name "${{ secrets.EB_APP_NAME }}" \
              --version-labels "${{ github.sha }}" \
              --query "ApplicationVersions[0].Status" --output text)
            echo "  Status: ${STATUS}"
            if [ "$STATUS" = "PROCESSED" ]; then
              echo "Version processed successfully"
              break
            fi
            if [ "$STATUS" = "FAILED" ]; then
              echo "Version processing failed"
              exit 1
            fi
            sleep 10
          done

      - name: Deploy
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name "${{ secrets.EB_ENV_NAME }}" \
            --version-label "${{ github.sha }}" \
            --region us-east-1

          aws elasticbeanstalk wait environment-updated \
            --environment-names "${{ secrets.EB_ENV_NAME }}" \
            --region us-east-1

          VERSION=$(aws elasticbeanstalk describe-environments \
            --environment-names "${{ secrets.EB_ENV_NAME }}" \
            --query "Environments[0].VersionLabel" --output text)

          if [ "$VERSION" != "${{ github.sha }}" ]; then
            echo "Deployment failed: expected ${{ github.sha }}, got ${VERSION}"
            exit 1
          fi
          echo "Deployed successfully: ${VERSION}"

  deploy-lambda:
    name: Deploy daily digest Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for digest/ changes
        id: changed
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1 && \
             ! git diff --name-only HEAD~1 HEAD | grep -qE '^(digest/|\.github/workflows/deploy\.yml$)'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No digest/ changes — skipping Lambda deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.changed.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Package and update Lambda
        if: steps.changed.outputs.skip != 'true'
        run: |
          cd digest
          zip -j lambda.zip lambda_function.py
          aws lambda update-function-code \
            --function-name dname53-daily-digest \
            --zip-file fileb://lambda.zip \
            --publish \
            --region us-east-1 \
            --query '{Version:Version,LastModified:LastModified,CodeSha256:CodeSha256}' \
            --output table
          echo "✓ Lambda updated"
